services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      HTTP_ADDR: ${HTTP_ADDR}
      LOG_LEVEL: ${LOG_LEVEL}
      JWT_SECRET: ${JWT_SECRET}
      # внутри docker-сети хост БД = имя сервиса "postgres"
      DB_DSN: ${DB_DSN_DOCKER}
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy