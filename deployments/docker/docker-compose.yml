services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DB_DSN: "postgres://postgres:postgres@postgres:5432/booking?sslmode=disable"
      JWT_SECRET: "dev_secret_change_me"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy